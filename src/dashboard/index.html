<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Platform &mdash; Internal Developer Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; }
    .btn { cursor: pointer; transition: all 0.15s; }
    .btn:hover { filter: brightness(1.15); }
    .status-running    { color: #22c55e; }
    .status-provisioning { color: #f59e0b; }
    .status-destroyed  { color: #64748b; }
    .status-failed     { color: #ef4444; }
    #chat-messages { max-height: 320px; overflow-y: auto; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Header -->
  <header class="border-b border-slate-700 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19.428 15.428a2 2 0 0 0-1.022-.547l-2.387-.477a6 6 0 0 0-3.86.517l-.318.158a6 6 0 0 1-3.86.517L6.05 15.21a2 2 0 0 1-1.806-1.741L3.5 8.5l1.5-1 2 1.5L9.5 7 12 9l2.5-2 2.5 2 1.5-1.5 1 1-.744 5.044a2 2 0 0 1-1.828 1.884z"/></svg>
      <h1 class="text-xl font-bold text-white">Cloud Platform</h1>
    </div>
    <span class="text-sm text-slate-400">Internal Developer Portal</span>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-3 gap-6">

    <!-- Left column: Services + Environments -->
    <div class="lg:col-span-2 space-y-6">

      <!-- Register Service -->
      <section class="card p-6">
        <h2 class="text-lg font-semibold mb-4 text-indigo-300">Register Service</h2>
        <form id="svc-form" class="grid grid-cols-2 gap-4">
          <input id="svc-name" placeholder="service-name" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm" required />
          <select id="svc-type" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm">
            <option value="web">Web</option>
            <option value="api">API</option>
            <option value="worker">Worker</option>
          </select>
          <input id="svc-owner" placeholder="owner" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm" required />
          <input id="svc-repo" placeholder="https://github.com/org/repo" class="bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm" required />
          <button type="submit" class="btn col-span-2 bg-indigo-600 text-white rounded-lg py-2 text-sm font-medium">Register</button>
        </form>
      </section>

      <!-- Service Catalog -->
      <section class="card p-6">
        <h2 class="text-lg font-semibold mb-4 text-indigo-300">Service Catalog</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="text-left text-slate-400 border-b border-slate-700">
              <th class="pb-2">Name</th><th class="pb-2">Type</th><th class="pb-2">Owner</th><th class="pb-2">Actions</th>
            </tr></thead>
            <tbody id="svc-table"></tbody>
          </table>
        </div>
      </section>

      <!-- Environments -->
      <section class="card p-6">
        <h2 class="text-lg font-semibold mb-4 text-indigo-300">Environments</h2>
        <div id="env-cards" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        <p id="env-empty" class="text-slate-500 text-sm">No environments provisioned yet.</p>
      </section>

      <!-- Cost Overview -->
      <section class="card p-6">
        <h2 class="text-lg font-semibold mb-4 text-indigo-300">Cost Overview</h2>
        <div id="cost-summary" class="text-sm text-slate-400">Loading cost data...</div>
      </section>
    </div>

    <!-- Right column: AI Assistant -->
    <div class="space-y-6">
      <section class="card p-6 flex flex-col h-full">
        <h2 class="text-lg font-semibold mb-4 text-indigo-300">AI Infrastructure Advisor</h2>
        <div id="chat-messages" class="flex-1 space-y-3 mb-4">
          <div class="text-sm text-slate-400 italic">Ask me about infrastructure recommendations, sizing, or cost optimization.</div>
        </div>
        <form id="chat-form" class="flex gap-2">
          <input id="chat-input" placeholder="Describe your service..." class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm" required />
          <button type="submit" class="btn bg-indigo-600 text-white rounded-lg px-4 py-2 text-sm font-medium">Ask</button>
        </form>
      </section>
    </div>
  </main>

<script>
const API = window.location.origin;

// ---- Services ----
async function loadServices() {
  const res = await fetch(`${API}/api/services`);
  const svcs = await res.json();
  const tbody = document.getElementById('svc-table');
  tbody.innerHTML = svcs.map(s => `
    <tr class="border-b border-slate-800">
      <td class="py-2 font-mono">${s.name}</td>
      <td class="py-2"><span class="px-2 py-0.5 bg-slate-700 rounded text-xs">${s.type}</span></td>
      <td class="py-2">${s.owner}</td>
      <td class="py-2 space-x-2">
        <button onclick="deploy(${s.id}, '${s.name}')" class="btn text-xs bg-green-700 px-2 py-1 rounded">Deploy Dev</button>
        <button onclick="deploy(${s.id}, '${s.name}', 'staging')" class="btn text-xs bg-yellow-700 px-2 py-1 rounded">Deploy Staging</button>
      </td>
    </tr>
  `).join('');
}

document.getElementById('svc-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {
    name: document.getElementById('svc-name').value,
    type: document.getElementById('svc-type').value,
    owner: document.getElementById('svc-owner').value,
    repo_url: document.getElementById('svc-repo').value,
  };
  const res = await fetch(`${API}/api/services`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
  if (res.ok) { document.getElementById('svc-form').reset(); loadServices(); }
  else { const err = await res.json(); alert(err.detail || 'Error'); }
});

// ---- Environments ----
async function loadEnvironments() {
  const res = await fetch(`${API}/api/environments`);
  const envs = await res.json();
  const container = document.getElementById('env-cards');
  const empty = document.getElementById('env-empty');
  if (envs.length === 0) { container.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  container.innerHTML = envs.map(e => `
    <div class="bg-slate-800 rounded-lg p-4 border border-slate-700">
      <div class="flex justify-between items-center mb-2">
        <span class="font-mono text-sm">${e.name}</span>
        <span class="text-xs status-${e.status}">${e.status.toUpperCase()}</span>
      </div>
      <div class="text-xs text-slate-400">Service #${e.service_id} &middot; ${e.region}</div>
      <div class="text-xs text-slate-500 mt-1">Created: ${e.created_at}</div>
      ${e.status !== 'destroyed' ? `<button onclick="destroyEnv(${e.id})" class="btn mt-2 text-xs bg-red-800 px-2 py-1 rounded">Destroy</button>` : ''}
    </div>
  `).join('');
}

async function deploy(serviceId, name, env = 'dev') {
  const res = await fetch(`${API}/api/environments`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ service_id: serviceId, name: env }),
  });
  if (res.ok) loadEnvironments();
  else { const err = await res.json(); alert(err.detail || 'Error'); }
}

async function destroyEnv(envId) {
  if (!confirm('Destroy this environment?')) return;
  await fetch(`${API}/api/environments/${envId}`, { method: 'DELETE' });
  loadEnvironments();
}

// ---- Costs ----
async function loadCosts() {
  const res = await fetch(`${API}/api/costs`);
  const data = await res.json();
  const el = document.getElementById('cost-summary');
  if (data.total === 0 && data.breakdown.length === 0) {
    el.innerHTML = '<span class="text-slate-500">No cost data available. Connect AWS credentials to enable Cost Explorer.</span>';
  } else {
    el.innerHTML = `<div class="text-2xl font-bold text-white mb-2">$${data.total.toFixed(2)} <span class="text-sm text-slate-400">${data.currency} / ${data.period}</span></div>` +
      data.breakdown.map(b => `<div class="flex justify-between py-1 border-b border-slate-700"><span>${b.service_name}</span><span>$${b.amount.toFixed(2)}</span></div>`).join('');
  }
}

// ---- AI Chat ----
document.getElementById('chat-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const input = document.getElementById('chat-input');
  const prompt = input.value.trim();
  if (!prompt) return;

  const msgs = document.getElementById('chat-messages');
  msgs.innerHTML += `<div class="bg-slate-800 rounded-lg p-3 text-sm"><strong class="text-indigo-300">You:</strong> ${prompt}</div>`;
  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const res = await fetch(`${API}/api/ai/suggest`, {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ prompt }),
    });
    const data = await res.json();
    if (res.ok) {
      msgs.innerHTML += `<div class="bg-slate-700 rounded-lg p-3 text-sm whitespace-pre-wrap"><strong class="text-green-300">AI:</strong> ${data.answer}</div>`;
    } else {
      msgs.innerHTML += `<div class="bg-red-900/30 rounded-lg p-3 text-sm text-red-300">Error: ${data.detail || 'AI service unavailable'}</div>`;
    }
  } catch (err) {
    msgs.innerHTML += `<div class="bg-red-900/30 rounded-lg p-3 text-sm text-red-300">Error: ${err.message}</div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
});

// ---- Init ----
loadServices();
loadEnvironments();
loadCosts();
</script>
</body>
</html>
